name: CI

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      users:
        description: "Total users"
        default: 5
      spawn_rate:
        description: "Spawn rate"
        default: 0.1
      duration:
        description: "Duration"
        default: 1m

  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Locust Image
      run: docker buildx build --load -t perf-tests .
    
    - name: Create Docker Network
      run: docker network create locust-net

    - name: List Docker images
      run: docker image ls

    - name: Start Locust Master
      run: |
        docker run -d --name locust-master \
          -p 8089:8089 \
          -p 5557:5557 \
          -p 5558:5558 \
          perf-tests \
          locust -f locustfile.py --master --web-host=0.0.0.0
     
    - name: Wait for Locust Master
      run: sleep 5

    - name: Start Locust Workers (3 workers)
      run: |
        for i in 1 2 3
        do
          docker run -d --name worker-$i \
          --link locust-master \
          perf-tests \
          locust -f locustfile.py --worker --master-host=locust-master
        done

    - name: Run Test in Headless Mode (20 users, 5 spawn rate, 60 sec)
      run: |
        docker exec locust-master \
          locust -f locustfile.py \
          --headless \
          -u "${{ github.event.inputs.users || 2 }}" \
          -r "${{ github.event.inputs.spawn_rate || 0.1 }}" \
          --run-time "${{ github.event.inputs.duration || '1m' }}" \
          --host http://eaapi.somee.com/ \
          --html /app/locust-report.html

    - name: Set timestamp
      run: echo "REPORT_TS=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

    - name: Copy report from container
      run: |
        docker cp locust-master:/app/locust-report.html locust-report.html

    - name: Prepare timestamped report folder
      run: |
        mkdir -p site/reports/${{ env.REPORT_TS }}
        mv locust-report.html site/reports/${{ env.REPORT_TS }}/index.html
        # update latest
        rm -rf site/reports/latest
        cp -R site/reports/${{ env.REPORT_TS }} site/reports/latest

    - name: Upload Load Test Report (timestamped)
      uses: actions/upload-artifact@v4
      with:
        name: locust-report-${{ env.REPORT_TS }}
        path: site/reports/${{ env.REPORT_TS }}/

    - name: Deploy Locust Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: site
        keep_files: true
        publish_branch: gh-pages

    - name: Cleanup
      run: docker rm -f locust-master worker-1 worker-2 worker-3 || true